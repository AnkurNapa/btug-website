    description: Deep-dive working sessions on data storytelling, dashboard design systems and governance.
  - name: AI Sessions
    description: Practical talks on Tableau Pulse, Einstein Copilot, and bringing GenAI into the analytics workflow.

dashboardCompetition:
  title: BTUG Dashboard Showdown
  description: A live competition where finalists build and present a dashboard from a surprise dataset, judged by community leaders.
  prize: Winner spotlight, a speaking slot at a future meetup, and partner-sponsored goodies.

networkingLounge:
  title: Networking Lounge
  description: An open space for #DataFam connections — meet speakers, recruiters and fellow analysts over chai between sessions.

sponsorExpo:
  title: Sponsor Expo
  description: Explore booths from analytics platforms, consultancies and hiring partners shaping Bengaluru's data ecosystem.

